name: "test-on-pr"
on: [pull_request]

jobs:
  check-whisper:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with: 
        components: clippy, rustfmt
    
    - name: check fmt
      run: cargo fmt --all -- --check

  test-whisper:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-14, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: install vulkan sdk
        if: matrix.platform == 'ubuntu-latest'
        uses: humbletim/install-vulkan-sdk@e7d6e7b937bde4503c7ba5c9584c9dc68f44c4b8

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build
      
      - name: run generic tests
        run: cargo test

      - name: cargo build (metal)
        if: matrix.platform == 'macos-14'
        run: cargo build --features metal
      
      - name: run generic tests (metal)
        if: matrix.platform == 'macos-14'
        run: cargo test --features metal